version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8008}:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/tc_manager.db
      - SECRET_KEY=${SECRET_KEY:-tc-manager-secret-key-change-in-production}
      - ENV=${ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
