name: "보안 이슈"
description: "보안 취약점, 인증/권한 문제, 데이터 노출 등을 보고합니다."
title: "[SEC] "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        **주의:** 심각한 보안 취약점은 공개 이슈 대신 비공개로 보고해주세요.

  - type: dropdown
    id: severity
    attributes:
      label: "심각도"
      description: "Block=서비스 전체 장애 / Critical=인증 우회, 데이터 유출 / Major=권한 누락 / Minor=경미한 보안 설정 (최소 Minor)"
      options:
        - Block
        - Critical
        - Major
        - Minor
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "발생 버전"
      placeholder: "1.0.0.0"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "재현 방법"
      description: "취약점 재현 스텝을 기술합니다."
      placeholder: |
        1. 일반 사용자로 로그인
        2. API 직접 호출
        3. 다른 프로젝트 데이터 접근 가능
    validations:
      required: true

  - type: textarea
    id: cause-and-fix
    attributes:
      label: "발생 원인 및 수정사항"
      placeholder: "권한 검증 누락 → check_project_access 적용"
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: "영향 범위"
      placeholder: "API 엔드포인트 전체"
    validations:
      required: false
