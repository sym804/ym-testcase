name: 버그 리포트
description: 기능 오류, UI 문제, 데이터 오류 등 버그를 등록합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - Frontend
        - Backend
        - DB
        - 보안
        - 기타
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      description: |
        Block: 서비스 전체 장애, 아무것도 못하는 상태
        Critical: 핵심 기능 마비, 다른 작업은 가능
        Major: 주요 기능 오류, 중요 UI 문제
        Minor: 사소한 기능 오류, 경미한 UI 문제
        Trivial: 기능 무관한 외관/텍스트
      options:
        - Block
        - Critical
        - Major
        - Minor
        - Trivial
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 발생 버전
      description: 버그가 발생한 버전 (예: 0.7.1.0)
      placeholder: "0.7.1.0"
    validations:
      required: true

  - type: textarea
    id: precondition
    attributes:
      label: 사전 조건
      description: 버그 재현에 필요한 사전 조건이 있으면 기술합니다. 없으면 "없음"으로 기록합니다.
      placeholder: "없음"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 재현 스텝을 번호로 기술합니다.
      placeholder: |
        1. 로그인 페이지 접속
        2. 잘못된 비밀번호 입력
        3. 에러 메시지 확인
    validations:
      required: true

  - type: textarea
    id: cause-and-fix
    attributes:
      label: 발생 원인 및 수정사항
      description: 원인 분석과 수정 내용을 기술합니다. 원인을 모르면 증상만 기술해도 됩니다.
      placeholder: "원인: OOO → 수정: OOO"
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 이 버그가 영향을 미치는 범위를 기술합니다.
      placeholder: "대시보드 차트 전체"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 증빙 스크린샷이 있으면 첨부합니다.
    validations:
      required: false
